<script>
        let currentZoom = 1;
        let currentRotation = 0;

        function zoomIn() {
            if (currentZoom < 2.5) {
                currentZoom += 0.2;
                updateTransform();
            }
        }

        function zoomOut() {
            if (currentZoom > 0.5) {
                currentZoom -= 0.2;
                updateTransform();
            }
        }

        function rotate() {
            currentRotation += 90;
            updateTransform();
        }

        function updateTransform() {
            const img = document.getElementById('preview-image');
            img.style.transform = `scale(${currentZoom}) rotate(${currentRotation}deg)`;
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';
        }

        function setStatus(status) {
            const appBtn = document.getElementById('approve-btn');
            const rejBtn = document.getElementById('reject-btn');
            
            if (status === 'approve') {
                appBtn.classList.remove('border-outline-variant', 'text-on-surface-variant');
                appBtn.classList.add('border-primary-container', 'bg-primary-container', 'text-white');
                rejBtn.classList.add('border-outline-variant', 'text-on-surface-variant');
                rejBtn.classList.remove('border-error', 'bg-error-container', 'text-on-error-container');
            } else {
                rejBtn.classList.remove('border-outline-variant', 'text-on-surface-variant');
                rejBtn.classList.add('border-error', 'bg-error-container', 'text-on-error-container');
                appBtn.classList.add('border-outline-variant', 'text-on-surface-variant');
                appBtn.classList.remove('border-primary-container', 'bg-primary-container', 'text-white');
            }
        }

        // Draggable container simulation (simplified)
        const container = document.getElementById('document-container');
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        container.parentNode.addEventListener('mousedown', (e) => {
            isDragging = true;
            container.parentNode.classList.add('cursor-grabbing');
            startX = e.pageX - container.parentNode.offsetLeft;
            startY = e.pageY - container.parentNode.offsetTop;
            scrollLeft = container.parentNode.scrollLeft;
            scrollTop = container.parentNode.scrollTop;
        });

        container.parentNode.addEventListener('mouseleave', () => {
            isDragging = false;
            container.parentNode.classList.remove('cursor-grabbing');
        });

        container.parentNode.addEventListener('mouseup', () => {
            isDragging = false;
            container.parentNode.classList.remove('cursor-grabbing');
        });

        container.parentNode.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - container.parentNode.offsetLeft;
            const y = e.pageY - container.parentNode.offsetTop;
            const walkX = (x - startX) * 1.5;
            const walkY = (y - startY) * 1.5;
            container.parentNode.scrollLeft = scrollLeft - walkX;
            container.parentNode.scrollTop = scrollTop - walkY;
        });
    </script>
